services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: personal_os
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: personal_os
    volumes:
      - personal_os_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U personal_os -d personal_os"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://personal_os:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/personal_os?schema=public
      PERSONAL_OS_API_TOKEN: ${PERSONAL_OS_API_TOKEN:?set PERSONAL_OS_API_TOKEN}
      PERSONAL_OS_READ_TOKEN: ${PERSONAL_OS_READ_TOKEN:?set PERSONAL_OS_READ_TOKEN}
      WIKI_READ_TOKEN: ${WIKI_READ_TOKEN:?set WIKI_READ_TOKEN}
      WIKI_API_TOKEN: ${WIKI_API_TOKEN:-}
      PERSONAL_OS_VAULT_DIR: ./data/vault
      PERSONAL_OS_ATTACHMENT_DIR: ./data/attachments
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?set NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_WIKI_URL: ${NEXT_PUBLIC_WIKI_URL:?set NEXT_PUBLIC_WIKI_URL}
    ports:
      - "0.0.0.0:3100:3000"
    volumes:
      - personal_os_data:/app/data

  wiki-worker:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NPM_CONFIG_REGISTRY: ${NPM_CONFIG_REGISTRY:-https://registry.npmmirror.com}
    command:
      - node
      - scripts/process-wiki-write-jobs.mjs
      - --loop
      - --limit=10
      - --interval-ms=5000
      - --worker-id=wiki-worker-prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://personal_os:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/personal_os?schema=public
      WIKI_API_TOKEN: ${WIKI_API_TOKEN:?set WIKI_API_TOKEN}
      NEXT_PUBLIC_WIKI_URL: ${NEXT_PUBLIC_WIKI_URL:?set NEXT_PUBLIC_WIKI_URL}
      WIKI_WRITE_JOB_LIMIT: 10
      WIKI_WRITE_JOB_INTERVAL_MS: 5000
      WIKI_WRITE_WORKER_ID: wiki-worker-prod
    volumes:
      - personal_os_data:/app/data

volumes:
  personal_os_postgres:
  personal_os_data:
