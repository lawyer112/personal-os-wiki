name: Release

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  DOCKER_BUILDKIT: "1"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://personal_os:replace-with-a-long-random-database-password@localhost:54329/personal_os?schema=public
      PERSONAL_OS_API_TOKEN: dev-test-token-0000
      PERSONAL_OS_READ_TOKEN: dev-read-token-0000
      WIKI_READ_TOKEN: dev-wiki-read-token-0000
      WIKI_API_TOKEN: dev-wiki-write-token-0000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_WIKI_URL: http://localhost:3422
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: personal-os-app/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve release version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          test "$(cat VERSION)" = "$VERSION"

      - name: Install Personal OS dependencies
        working-directory: personal-os-app
        run: npm ci

      - name: Generate Prisma client
        working-directory: personal-os-app
        run: npm run prisma:generate

      - name: Test Personal OS
        working-directory: personal-os-app
        run: npm test

      - name: Audit Personal OS dependencies
        working-directory: personal-os-app
        run: npm audit --omit=dev --audit-level=moderate

      - name: Type-check Personal OS
        working-directory: personal-os-app
        run: npx tsc --noEmit

      - name: Lint Personal OS
        working-directory: personal-os-app
        run: npm run lint

      - name: Build Personal OS
        working-directory: personal-os-app
        run: npm run build

      - name: Compile Personal Wiki
        run: python -m py_compile personal-wiki/api/server.py

      - name: Package release archives
        shell: pwsh
        run: ./scripts/package-release.ps1 -Version $env:VERSION

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "dist/personal-os-wiki-v${VERSION}.zip" \
            "dist/personal-os-wiki-v${VERSION}.tar.gz" \
            "dist/SHA256SUMS.txt" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
