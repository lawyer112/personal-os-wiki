version: 2
updates:
  - package-ecosystem: npm
    directory: /personal-os-app
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - personal-os-app
    groups:
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      dev-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: pip
    directory: /personal-wiki
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - personal-wiki
    commit-message:
      prefix: "chore(deps)"
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(deps)"
      include: scope
