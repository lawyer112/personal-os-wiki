<svg width="1280" height="360" viewBox="0 0 1280 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Personal OS + Personal Wiki 中文执行闭环图</title>
  <desc id="desc">从捕获碎片，到 Wiki 入库、任务生成、Agent 认领、提交证据、人工复核和更新记忆的闭环。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
    <filter id="shadow" x="-20" y="-20" width="230" height="170" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1280" height="360" rx="32" fill="url(#bg)"/>

  <g font-family="Noto Sans SC, Microsoft YaHei, PingFang SC, Inter, Segoe UI, Arial, sans-serif">
    <text x="640" y="58" fill="#0F172A" font-size="30" font-weight="850" text-anchor="middle">这套系统新增的闭环</text>
    <text x="640" y="91" fill="#475569" font-size="18" text-anchor="middle">把收藏、碎碎念和想法，变成可复核的任务推进，而不是继续躺在聊天记录里。</text>

    <g transform="translate(58 138)" filter="url(#shadow)">
      <rect width="160" height="116" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="80" y="45" fill="#0F766E" font-size="18" font-weight="850" text-anchor="middle">1. 捕获</text>
      <text x="80" y="76" fill="#475569" font-size="15" text-anchor="middle">链接、语音、</text>
      <text x="80" y="96" fill="#475569" font-size="15" text-anchor="middle">碎碎念</text>
    </g>
    <path d="M232 196H316" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M304 184L320 196L304 208" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(336 138)" filter="url(#shadow)">
      <rect width="160" height="116" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="80" y="45" fill="#6D28D9" font-size="18" font-weight="850" text-anchor="middle">2. 入库</text>
      <text x="80" y="76" fill="#475569" font-size="15" text-anchor="middle">长期笔记、</text>
      <text x="80" y="96" fill="#475569" font-size="15" text-anchor="middle">标签、图谱</text>
    </g>
    <path d="M510 196H594" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M582 184L598 196L582 208" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(614 138)" filter="url(#shadow)">
      <rect width="160" height="116" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="80" y="45" fill="#B45309" font-size="18" font-weight="850" text-anchor="middle">3. 任务</text>
      <text x="80" y="76" fill="#475569" font-size="15" text-anchor="middle">下一步动作、</text>
      <text x="80" y="96" fill="#475569" font-size="15" text-anchor="middle">完成标准</text>
    </g>
    <path d="M788 196H872" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M860 184L876 196L860 208" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(892 138)" filter="url(#shadow)">
      <rect width="160" height="116" rx="24" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="80" y="45" fill="#1D4ED8" font-size="18" font-weight="850" text-anchor="middle">4. Agent</text>
      <text x="80" y="76" fill="#475569" font-size="15" text-anchor="middle">认领、心跳、</text>
      <text x="80" y="96" fill="#475569" font-size="15" text-anchor="middle">提交证据</text>
    </g>
    <path d="M1066 196H1150" stroke="#94A3B8" stroke-width="4" stroke-linecap="round"/>
    <path d="M1138 184L1154 196L1138 208" stroke="#94A3B8" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <g transform="translate(1168 138)" filter="url(#shadow)">
      <rect width="54" height="116" rx="24" fill="#0F172A"/>
      <text x="27" y="42" fill="#FFFFFF" font-size="14" font-weight="850" text-anchor="middle">5</text>
      <text x="27" y="68" fill="#FFFFFF" font-size="12" font-weight="760" text-anchor="middle">复核</text>
      <text x="27" y="88" fill="#CBD5E1" font-size="11" text-anchor="middle">更新</text>
    </g>
  </g>
</svg>
